name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-no-db:
    name: Unit tests (no database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # DATABASE_URL intentionally unset: DB-gated suites must skip cleanly.
      - run: npx vitest run

  test-with-db:
    name: Full tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      SESSION_SECRET: ci-only-not-a-real-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Push schema
        run: npm run db:push -- --force
      - run: npx vitest run

  typecheck-ratchet:
    name: TypeScript error ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Count tsc errors vs baseline
        run: |
          set +e
          COUNT=$(npm run check 2>&1 | grep -c "error TS")
          set -e
          BASELINE=$(cat scripts/ts-error-baseline.txt)
          echo "tsc errors: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::TypeScript error count grew from $BASELINE to $COUNT — fix new errors before merging."
            exit 1
          fi
          if [ "$COUNT" -lt "$BASELINE" ]; then
            echo "::notice::Error count dropped to $COUNT — consider lowering scripts/ts-error-baseline.txt to ratchet progress."
          fi
